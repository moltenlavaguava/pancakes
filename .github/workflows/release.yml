name: Release Pancakes

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  # --- WINDOWS AND LINUX ---
  build-win-linux:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            binary_name: pancakes.exe
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            binary_name: pancakes

    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Install Linux dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config libx11-dev libasound2-dev libfontconfig1-dev libvulkan-dev libwayland-dev libxkbcommon-dev libdbus-1-dev

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Upload Release
        uses: softprops/action-gh-release@v1
        with:
          files: target/${{ matrix.target }}/release/${{ matrix.binary_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # --- MACOS WITH CARGO-BUNDLE ---
  build-macos:
    name: Build macOS Universal
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Rust Targets
        run: |
          rustup target add x86_64-apple-darwin
          rustup target add aarch64-apple-darwin

      - name: Install cargo-bundle
        run: cargo install cargo-bundle

      - uses: swatinem/rust-cache@v2

      - name: Build Intel and Apple Silicon
        run: |
          cargo build --release --target x86_64-apple-darwin
          cargo build --release --target aarch64-apple-darwin

      - name: Bundle and Create Universal Binary
        run: |
          # 1. Use cargo-bundle to create the folder structure (.app) for one architecture
          cargo bundle --release --target x86_64-apple-darwin
          
          # 2. Extract the .app folder created by cargo-bundle
          # (cargo-bundle puts it in target/x86_64-apple-darwin/bundle/osx/Pancakes.app)
          cp -r target/x86_64-apple-darwin/bundle/osx/Pancakes.app .
          
          # 3. Use lipo to merge the Intel and Silicon binaries into a Universal binary
          # and overwrite the binary inside the bundle
          lipo -create \
            target/x86_64-apple-darwin/release/pancakes \
            target/aarch64-apple-darwin/release/pancakes \
            -output "Pancakes.app/Contents/MacOS/pancakes"
          
          # 4. Zip it up
          zip -r Pancakes-macOS-Universal.zip "Pancakes.app"

      - name: Upload macOS Release
        uses: softprops/action-gh-release@v1
        with:
          files: Pancakes-macOS-Universal.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}