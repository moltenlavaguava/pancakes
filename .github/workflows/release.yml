name: Release Pancakes

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

# Fixes the 403 error by giving the action permission to write releases
permissions:
  contents: write

jobs:
  # --- WINDOWS AND LINUX ---
  build-win-linux:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            binary_name: pancakes.exe
            asset_name: pancakes.exe
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            binary_name: pancakes
            asset_name: pancakes-linux

    steps:
      - uses: actions/checkout@v4 # v4 is the current standard

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust Cache
        uses: swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Install Linux dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config libx11-dev libasound2-dev libfontconfig1-dev libvulkan-dev libwayland-dev libxkbcommon-dev libdbus-1-dev

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Rename Linux Binary
        if: matrix.os == 'ubuntu-latest'
        run: mv target/${{ matrix.target }}/release/${{ matrix.binary_name }} target/${{ matrix.target }}/release/${{ matrix.asset_name }}

      - name: Upload Release
        uses: softprops/action-gh-release@v2 # Updated from v1 to v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: target/${{ matrix.target }}/release/${{ matrix.asset_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # --- MACOS WITH CARGO-BUNDLE ---
  build-macos:
    name: Build macOS Universal
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Rust Targets
        run: |
          rustup target add x86_64-apple-darwin
          rustup target add aarch64-apple-darwin

      - name: Install cargo-bundle
        run: cargo install cargo-bundle

      - name: Rust Cache
        uses: swatinem/rust-cache@v2

      - name: Build Intel and Apple Silicon
        run: |
          cargo build --release --target x86_64-apple-darwin
          cargo build --release --target aarch64-apple-darwin

      - name: Bundle and Create Universal Binary
        run: |
          cargo bundle --release --target x86_64-apple-darwin
          cp -r target/x86_64-apple-darwin/release/bundle/osx/pancakes.app .
          
          lipo -create \
            target/x86_64-apple-darwin/release/pancakes \
            target/aarch64-apple-darwin/release/pancakes \
            -output "pancakes.app/Contents/MacOS/pancakes"
          
          zip -r pancakes-macOS-Universal.zip "pancakes.app"

      - name: Upload macOS Release
        uses: softprops/action-gh-release@v2 # Updated from v1 to v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: pancakes-macOS-Universal.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}